name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  scan_ruby:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

  scan_js:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  unit-test:
    runs-on: ubuntu-latest
    needs: [scan_ruby, scan_js]
    
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/travel_planner_test
    
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: travel_planner_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up database
        run: |
          echo "📦 Setting up database..."
          bin/rails db:create db:schema:load
          echo "✅ Database ready"

      - name: Precompile assets
        run: |
          echo "🎨 Precompiling assets..."
          time bin/rails assets:precompile
          echo "✅ Assets compiled"

      - name: Run unit tests
        run: |
          echo "⏱️  Starting unit tests at $(date '+%Y-%m-%d %H:%M:%S')"
          bundle exec rspec --tag ~type:system --format progress --profile 10
          echo "✅ Finished unit tests at $(date '+%Y-%m-%d %H:%M:%S')"

      - name: Upload unit test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-coverage
          path: coverage/
          retention-days: 7

  e2e-test:
    runs-on: ubuntu-latest
    needs: [scan_ruby, scan_js]
    
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/travel_planner_test
    
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: travel_planner_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Install Chrome browser
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
      
      - name: Verify Chrome installation
        run: |
          which google-chrome-stable || which google-chrome || which chromium
          google-chrome-stable --version || google-chrome --version || chromium --version

      - name: Set up database
        run: |
          echo "📦 Setting up database..."
          bin/rails db:create db:schema:load
          echo "✅ Database ready"

      - name: Precompile assets
        run: |
          echo "🎨 Precompiling assets..."
          time bin/rails assets:precompile
          echo "✅ Assets compiled"

      - name: Run E2E tests
        run: |
          echo "⏱️  Starting E2E tests at $(date '+%Y-%m-%d %H:%M:%S')"
          # Temporarily running only one test for debugging
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" bundle exec rspec spec/system/trips_management_spec.rb:14 --format documentation --profile 10
          echo "✅ Finished E2E tests at $(date '+%Y-%m-%d %H:%M:%S')"
        env:
          # Chrome configuration for CI
          CHROME_NO_SANDBOX: true
          RAILS_ENV: test

      - name: Upload E2E test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-coverage
          path: coverage/
          retention-days: 7

      - name: Upload E2E test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-test-screenshots
          path: tmp/screenshots/
          retention-days: 7
